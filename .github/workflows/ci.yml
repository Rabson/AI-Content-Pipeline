name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_smoke_docker:
        description: 'Run optional Docker runtime parity smoke stage'
        required: false
        default: 'false'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_content_pipeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ai_content_pipeline"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_content_pipeline
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_content_pipeline_shadow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Prepare shadow database
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS ai_content_pipeline_shadow;"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "CREATE DATABASE ai_content_pipeline_shadow;"
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build API
        run: npm run build:api
      - name: Build worker
        run: npm run build:worker
      - name: Build dashboard
        run: npm run build:dashboard
      - name: Prisma Validate
        run: npx prisma validate
      - name: Prisma Migrate Deploy
        run: npx prisma migrate deploy
      - name: Prisma Migration Drift Check
        run: |
          npx prisma migrate diff \
            --from-migrations apps/api/src/prisma/migrations \
            --to-schema-datamodel apps/api/src/prisma/schema.prisma \
            --shadow-database-url "$SHADOW_DATABASE_URL" \
            --exit-code

  service_smoke:
    name: Service Smoke (${{ matrix.service }})
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            command: npm run build:api
          - service: worker
            command: npm run build:worker
          - service: dashboard
            command: npm run build:dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run service smoke build
        run: ${{ matrix.command }}

  smoke_docker_optional:
    name: Optional Docker Parity Smoke
    needs: ci
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_smoke_docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prepare runtime env
        run: cp .env.example .env
      - name: Run docker smoke parity
        run: make smoke-docker
