version: '3.9'
services:
  postgres:
    volumes:
      - ../../.local-data/postgres:/var/lib/postgresql/data

  redis:
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --stop-writes-on-bgsave-error
      - "no"

  api:
    build:
      target: dev
    working_dir: /workspace
    command:
      - sh
      - -lc
      - sh scripts/docker-dev-bootstrap.sh dev:api
    volumes:
      - ../../:/workspace
      - api_node_modules:/workspace/node_modules
    environment:
      APP_ENV: local
      AUTH_ALLOW_HEADER_BYPASS: 'true'

  worker:
    build:
      target: dev
    working_dir: /workspace
    command:
      - sh
      - -lc
      - sh scripts/docker-dev-bootstrap.sh dev:worker
    volumes:
      - ../../:/workspace
      - worker_node_modules:/workspace/node_modules
    environment:
      APP_ENV: local

  dashboard:
    build:
      target: dev
    working_dir: /workspace
    command:
      - sh
      - -lc
      - sh scripts/docker-dev-bootstrap.sh dev:dashboard
    volumes:
      - ../../:/workspace
      - dashboard_node_modules:/workspace/node_modules
      - dashboard_next_data:/workspace/apps/dashboard/.next
    environment:
      NEXT_PUBLIC_APP_ENV: local

volumes:
  api_node_modules:
  worker_node_modules:
  dashboard_node_modules:
  dashboard_next_data:
