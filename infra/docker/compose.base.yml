version: '3.9'
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_content_pipeline
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ai_content_pipeline']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '${REDIS_HOST_PORT:-6379}:6379'

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - '${MINIO_API_HOST_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_HOST_PORT:-9001}:9001'
    volumes:
      - minio_data:/data

  migrate:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      target: migrate
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_content_pipeline
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_content_pipeline
      REDIS_URL: redis://redis:6379
      QUEUE_PREFIX: ${QUEUE_PREFIX:-ai-content-local}
      FEATURE_PHASE2_ENABLED: 'true'
      FEATURE_PHASE3_ENABLED: 'true'
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL_RESEARCH: ${OPENAI_MODEL_RESEARCH:-gpt-4.1-mini}
      OPENAI_MODEL_DRAFT: ${OPENAI_MODEL_DRAFT:-gpt-4.1-mini}
      DEVTO_API_KEY: ${DEVTO_API_KEY:-}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-s3}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-ai-content-pipeline-local}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-http://localhost:9000/ai-content-pipeline-local}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minio}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minio123}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      WORKER_HEALTH_BASE_URL: http://worker:3002
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-local}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-ai-content-pipeline}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_LOG_LEVEL: ${OTEL_LOG_LEVEL:-error}
      USER_TOKEN_ENCRYPTION_KEY: ${USER_TOKEN_ENCRYPTION_KEY:-local-dev-user-token-key}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    ports:
      - '${API_HOST_PORT:-3001}:3001'

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_content_pipeline
      REDIS_URL: redis://redis:6379
      QUEUE_PREFIX: ${QUEUE_PREFIX:-ai-content-local}
      WORKER_METRICS_PORT: 3002
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL_RESEARCH: ${OPENAI_MODEL_RESEARCH:-gpt-4.1-mini}
      OPENAI_MODEL_DRAFT: ${OPENAI_MODEL_DRAFT:-gpt-4.1-mini}
      DEVTO_API_KEY: ${DEVTO_API_KEY:-}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-s3}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-ai-content-pipeline-local}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minio}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minio123}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-local}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-ai-content-pipeline}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_LOG_LEVEL: ${OTEL_LOG_LEVEL:-error}
      USER_TOKEN_ENCRYPTION_KEY: ${USER_TOKEN_ENCRYPTION_KEY:-local-dev-user-token-key}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    ports:
      - '${WORKER_METRICS_HOST_PORT:-3002}:3002'

  dashboard:
    build:
      context: ../..
      dockerfile: apps/dashboard/Dockerfile
    environment:
      INTERNAL_API_BASE_URL: http://api:3001/api
      API_BASE_URL: http://api:3001/api
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${API_HOST_PORT:-3001}/api
      NEXT_PUBLIC_FEATURE_PHASE2_ENABLED: 'true'
      NEXT_PUBLIC_FEATURE_PHASE3_ENABLED: 'true'
      NEXTAUTH_URL: http://localhost:${DASHBOARD_HOST_PORT:-3003}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-local-dev-secret}
    depends_on:
      - api
    ports:
      - '${DASHBOARD_HOST_PORT:-3003}:3003'

volumes:
  postgres_data:
  minio_data:
