version: '3.9'
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_content_pipeline
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '${REDIS_HOST_PORT:-6379}:6379'

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - '${MINIO_API_HOST_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_HOST_PORT:-9001}:9001'
    volumes:
      - minio_data:/data

  migrate:
    image: node:20
    working_dir: /workspace
    command: sh -c "npm install && npx prisma generate --schema apps/api/src/prisma/schema.prisma && npx prisma migrate deploy --schema apps/api/src/prisma/schema.prisma"
    volumes:
      - ../../:/workspace
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_content_pipeline
    depends_on:
      - postgres
    restart: 'no'

  api:
    image: node:20
    working_dir: /workspace
    command: sh -c "npm run dev:api"
    volumes:
      - ../../:/workspace
    environment:
      APP_ENV: local
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_content_pipeline
      REDIS_URL: redis://redis:6379
      QUEUE_PREFIX: ai-content-local
      AUTH_ALLOW_HEADER_BYPASS: 'true'
      FEATURE_PHASE2_ENABLED: 'true'
      FEATURE_PHASE3_ENABLED: 'true'
      STORAGE_PROVIDER: s3
      STORAGE_BUCKET: ai-content-pipeline-local
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_BASE_URL: http://localhost:${MINIO_API_HOST_PORT:-9000}/ai-content-pipeline-local
      STORAGE_FORCE_PATH_STYLE: 'true'
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_REGION: us-east-1
      WORKER_HEALTH_BASE_URL: http://worker:3002
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    ports:
      - '${API_HOST_PORT:-3001}:3001'
    profiles: ['local']

  worker:
    image: node:20
    working_dir: /workspace
    command: sh -c "npm run dev:worker"
    volumes:
      - ../../:/workspace
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_content_pipeline
      REDIS_URL: redis://redis:6379
      QUEUE_PREFIX: ai-content-local
      WORKER_METRICS_PORT: 3002
      STORAGE_PROVIDER: s3
      STORAGE_BUCKET: ai-content-pipeline-local
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_FORCE_PATH_STYLE: 'true'
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_REGION: us-east-1
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    ports:
      - '${WORKER_METRICS_HOST_PORT:-3002}:3002'
    profiles: ['local']

  dashboard:
    image: node:20
    working_dir: /workspace
    command: sh -c "npm run dev:dashboard"
    volumes:
      - ../../:/workspace
      - dashboard_next_data:/workspace/apps/dashboard/.next-docker
    environment:
      NEXT_PUBLIC_APP_ENV: local
      INTERNAL_API_BASE_URL: http://api:3001/api
      API_BASE_URL: http://api:3001/api
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${API_HOST_PORT:-3001}/api
      NEXT_PUBLIC_FEATURE_PHASE2_ENABLED: 'true'
      NEXT_PUBLIC_FEATURE_PHASE3_ENABLED: 'true'
      NEXTAUTH_URL: http://localhost:${DASHBOARD_HOST_PORT:-3000}
      NEXTAUTH_SECRET: local-dev-secret
      NEXT_DIST_DIR: .next-docker
      DASHBOARD_ACCESS_CODE: local-access
      AUTH_ALLOWED_EMAIL_DOMAINS: example.com
      AUTH_ADMIN_EMAILS: operator@example.com
    depends_on:
      - api
    ports:
      - '${DASHBOARD_HOST_PORT:-3000}:3000'
    profiles: ['local']

volumes:
  postgres_data:
  minio_data:
  dashboard_next_data:
