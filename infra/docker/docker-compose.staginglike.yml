version: '3.9'
services:
  api:
    environment:
      APP_ENV: staging
      NODE_ENV: production
      QUEUE_PREFIX: ai-content-staging
      SENTRY_ENVIRONMENT: staging
      AUTH_ALLOW_HEADER_BYPASS: 'false'
      FEATURE_PHASE2_ENABLED: 'true'
      FEATURE_PHASE3_ENABLED: 'true'

  worker:
    environment:
      APP_ENV: staging
      NODE_ENV: production
      QUEUE_PREFIX: ai-content-staging
      SENTRY_ENVIRONMENT: staging

  dashboard:
    environment:
      NEXT_PUBLIC_APP_ENV: staging
      NEXT_PUBLIC_FEATURE_PHASE2_ENABLED: 'true'
      NEXT_PUBLIC_FEATURE_PHASE3_ENABLED: 'true'
      NEXTAUTH_URL: http://localhost:3003
