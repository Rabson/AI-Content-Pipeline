services:
  - type: worker
    name: ai-content-worker-staging
    runtime: node
    rootDir: .
    plan: starter
    buildCommand: npm install && npx prisma generate --schema apps/api/src/prisma/schema.prisma && npm run build:worker
    startCommand: npm --workspace @aicp/worker run start
    envVars:
      - key: APP_ENV
        value: staging
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEVTO_API_KEY
        sync: false
      - key: QUEUE_PREFIX
        value: ai-content-staging
      - key: WORKER_METRICS_PORT
        value: '3002'
      - key: STORAGE_PROVIDER
        sync: false
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_FORCE_PATH_STYLE
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: staging
