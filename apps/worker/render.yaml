services:
  - type: worker
    name: ai-content-worker
    runtime: node
    rootDir: .
    plan: starter
    buildCommand: npm install && npx prisma generate --schema apps/api/src/prisma/schema.prisma && npm run build:worker
    startCommand: npm run start:worker
    envVars:
      - key: APP_ENV
        value: production
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: INTERNAL_API_BASE_URL
        sync: false
      - key: INTERNAL_SERVICE_JWT_SECRET
        sync: false
      - key: INTERNAL_SERVICE_JWT_ISSUER
        value: aicp-api
      - key: INTERNAL_SERVICE_JWT_AUDIENCE
        value: aicp-api
      - key: INTERNAL_SERVICE_JWT_TTL_SECONDS
        value: '300'
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL_RESEARCH
        value: gpt-4.1-mini
      - key: OPENAI_MODEL_DRAFT
        value: gpt-4.1-mini
      - key: QUEUE_PREFIX
        value: ai-content-prod
      - key: WORKER_METRICS_PORT
        value: '3002'
      - key: STORAGE_PROVIDER
        sync: false
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_FORCE_PATH_STYLE
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
