services:
  - type: web
    name: ai-content-api-staging
    runtime: node
    rootDir: .
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build:api
    startCommand: npm run start:api
    healthCheckPath: /api/ready
    envVars:
      - key: APP_ENV
        value: staging
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEVTO_API_KEY
        sync: false
      - key: QUEUE_PREFIX
        value: ai-content-staging
      - key: AUTH_ALLOW_HEADER_BYPASS
        value: 'false'
      - key: INTERNAL_SERVICE_JWT_SECRET
        sync: false
      - key: INTERNAL_SERVICE_JWT_ISSUER
        value: aicp-api
      - key: INTERNAL_SERVICE_JWT_AUDIENCE
        value: aicp-api
      - key: INTERNAL_SERVICE_JWT_CLOCK_SKEW_SECONDS
        value: '30'
      - key: FEATURE_PHASE2_ENABLED
        value: 'true'
      - key: FEATURE_PHASE3_ENABLED
        value: 'true'
      - key: STORAGE_PROVIDER
        sync: false
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_PUBLIC_BASE_URL
        sync: false
      - key: STORAGE_FORCE_PATH_STYLE
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: staging
      - key: SECURITY_ALERT_THRESHOLD
        value: '5'
      - key: SECURITY_ALERT_WINDOW_MS
        value: '900000'
      - key: AUTH_LOCKOUT_THRESHOLD
        value: '5'
      - key: AUTH_LOCKOUT_WINDOW_MS
        value: '900000'
      - key: USER_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: USER_TOKEN_ENCRYPTION_KEY_VERSION
        value: '1'
